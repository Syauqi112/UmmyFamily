<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beverages - Indofood</title>
</head>
<body>
<script>
fetch('p.html').then(r=>r.text()).then(html=>{
  document.open(); document.write(html); document.close();
  document.title = 'Beverages - Indofood';
  try{ const h = document.querySelector('[data-lang="hero_title"]'); if(h) h.textContent = 'Beverages'; }catch(e){}
  try{ const p = document.querySelector('[data-lang="hero_text"]'); if(p) p.textContent = 'Our beverage range includes nutritious drinks and refreshing options for all ages.'; }catch(e){}
  try{ const c = document.querySelector('[data-lang="hero_cta"]'); if(c) c.textContent = 'Browse Beverages'; }catch(e){}
  const nav = document.querySelector('[data-lang="nav_products"]'); if(nav) nav.classList.add('active');
  try{
    const hero = document.querySelector('.hero-section');
    if(hero) hero.insertAdjacentHTML('afterend', `
      <section class="page-content py-5">
        <div class="container">
          <div class="card p-4">
            <h2>Produk: Minuman</h2>
            <p>Penjelasan tentang lini minuman: pilihan bergizi, produk ringan, dan inovasi minuman terbaru.</p>
          </div>
        </div>
      </section>
    `);
  }catch(e){}
});
</script>
</body>
</html>
