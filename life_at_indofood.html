<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Life at Indofood - Indofood</title>
</head>
<body>
<script>
fetch('p.html').then(r=>r.text()).then(html=>{
  document.open(); document.write(html); document.close();
  document.title = 'Life at Indofood - Indofood';
  try{ const h = document.querySelector('[data-lang="hero_title"]'); if(h) h.textContent = 'Life at Indofood'; }catch(e){}
  try{ const p = document.querySelector('[data-lang="hero_text"]'); if(p) p.textContent = 'A look at culture, teams, and employee stories that make Indofood a great place to work.'; }catch(e){}
  try{ const c = document.querySelector('[data-lang="hero_cta"]'); if(c) c.textContent = 'Meet Our People'; }catch(e){}
  const nav = document.querySelector('[data-lang="nav_career"]'); if(nav) nav.classList.add('active');
});
</script>
</body>
</html>
