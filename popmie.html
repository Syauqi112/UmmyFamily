<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pop Mie - Indofood</title>
</head>
<body>
<script>
fetch('p.html').then(r=>r.text()).then(html=>{
  document.open(); document.write(html); document.close();
  document.title = 'Pop Mie - Indofood';
  try{ const h = document.querySelector('[data-lang="hero_title"]'); if(h) h.textContent = 'Pop Mie'; }catch(e){}
  try{ const p = document.querySelector('[data-lang="hero_text"]'); if(p) p.textContent = 'Pop Mie range: convenient, ready-to-eat noodle cups and snack options.'; }catch(e){}
  try{ const c = document.querySelector('[data-lang="hero_cta"]'); if(c) c.textContent = 'Discover Pop Mie'; }catch(e){}
  const nav = document.querySelector('[data-lang="nav_brands"]'); if(nav) nav.classList.add('active');
  try{
    const hero = document.querySelector('.hero-section');
    if(hero) hero.insertAdjacentHTML('afterend', `
      <section class="page-content py-5">
        <div class="container">
          <div class="card p-4">
            <h2>Pop Mie</h2>
            <p>Ringkasan Pop Mie: produk cepat saji dalam cup, varian rasa, dan tips gaya hidup praktis.</p>
          </div>
        </div>
      </section>
    `);
  }catch(e){}
});
</script>
</body>
</html>
