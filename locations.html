<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Locations - Indofood</title>
</head>
<body>
<script>
fetch('p.html').then(r=>r.text()).then(html=>{
  document.open(); document.write(html); document.close();
  document.title = 'Locations - Indofood';
  try{ const h = document.querySelector('[data-lang="hero_title"]'); if(h) h.textContent = 'Locations'; }catch(e){}
  try{ const p = document.querySelector('[data-lang="hero_text"]'); if(p) p.textContent = 'Find our factories, offices, and distribution centers across Indonesia and beyond.'; }catch(e){}
  try{ const c = document.querySelector('[data-lang="hero_cta"]'); if(c) c.textContent = 'View Map'; }catch(e){}
  const nav = document.querySelector('[data-lang="nav_about"]'); if(nav) nav.classList.add('active');
  try{
    const hero = document.querySelector('.hero-section');
    if(hero) hero.insertAdjacentHTML('afterend', `
      <section class="page-content py-5">
        <div class="container">
          <div class="card p-4">
            <h2>Lokasi Kami</h2>
            <p>Daftar pabrik, kantor pusat, dan pusat distribusi Indofood, lengkap dengan informasi alamat dan kontak.</p>
          </div>
        </div>
      </section>
    `);
  }catch(e){}
});
</script>
</body>
</html>
